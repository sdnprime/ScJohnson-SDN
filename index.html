<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCJohnson</title>
    <link rel="icon" type="images/x-icon" href="./logo/scj-icon.png" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <a
          href="https://whatsinsidescjohnson.com/pt-br"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img src="./logo/scj_logo.svg" alt="Logo da SCJohnson" />
        </a>
        <div class="header-left">
          <h1>MARKETPLACE CIM</h1>
        </div>
        <a
          href="https://cognitivos.com.br/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            src="./logo/CIMLOGO.png"
            alt="Logo da Cognitivos"
            class="logocim"
          />
        </a>
      </div>

      <!-- Search Bar -->
      <div class="search-container">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Pesquisar produto"
        />
      </div>
    </header>

    <!-- Categories -->
    <nav class="categories">
      <button class="category-btn active" data-category="all">Todos</button>
      <button class="category-btn" data-category="OFF!">OFF!</button>
      <button class="category-btn" data-category="Glade">Glade</button>
      <button class="category-btn" data-category="Lysoform">Lysoform</button>
      <button class="category-btn" data-category="Raid">Raid</button>
      <button class="category-btn" data-category="Pato">Pato</button>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="products-container" id="productsContainer">
        <!-- Products will be inserted here by JavaScript -->
      </div>
    </main>

    <footer>
      <span> Copyright ® SDN. </span>
      <span> Todos os direitos reservados. </span>
    </footer>

    <script src="./js/script.js"></script>
  </body>
</html>
